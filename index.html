<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Readnexa Finder - Pro Responsive</title>

  <style>
    /* Sabse pehle box-sizing theek karein */
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f8f9fa;
      color: #333;
      text-align: center;
      padding: 40px 15px;
    }

    .logo {
      font-size: clamp(30px, 10vw, 55px); /* Fluid size: mobile pe chota, PC pe bada */
      font-weight: bold;
      color: #4285f4; 
      margin-bottom: 5px;
    }
    
    .logo span:nth-child(2) { color: #ea4335; } 
    .logo span:nth-child(3) { color: #fbbc05; } 
    .logo span:nth-child(4) { color: #4285f4; } 
    .logo span:nth-child(5) { color: #34a853; } 
    .logo span:nth-child(6) { color: #ea4335; } 

    p.subtitle {
      color: #5f6368;
      margin-bottom: 30px;
      font-size: 14px;
      padding: 0 10px;
    }

    /* Search Container: Mobile par stack hoga, PC par line mein */
    .search-wrapper {
      display: flex;
      flex-direction: column; /* Mobile first: Ek ke niche ek */
      gap: 10px;
      max-width: 800px;
      margin: 0 auto;
    }

    /* PC view (Desktop) */
    @media (min-width: 768px) {
      .search-wrapper {
        flex-direction: row; /* PC par line mein */
        background: #fff;
        border: 1px solid #dfe1e5;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        gap: 0;
      }
      
      .search-wrapper select, 
      .search-wrapper input {
        border: none !important;
        border-right: 1px solid #dfe1e5 !important;
      }
      
      .search-wrapper button {
        border-radius: 0 8px 8px 0 !important;
      }
    }

    /* Common Input Styles */
    select, input, button {
      height: 50px;
      font-size: 16px;
      padding: 0 15px;
      outline: none;
      width: 100%; /* Mobile par full width */
      border-radius: 8px;
      border: 1px solid #dfe1e5;
      background: #fff;
    }

    #engine { background: #f1f3f4; }

    .search-btn {
      background: #202124;
      color: #fff;
      font-weight: bold;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }

    .search-btn:hover { background: #000; }

  </style>
</head>
<body>

<div class="logo">
  <span>R</span><span>e</span><span>a</span><span>d</span><span>n</span><span>e</span><span>x</span><span>a</span>
</div>
<p class="subtitle">Direct download links finder for any device.</p>

<div class="search-wrapper">
  <select id="filetype">
    <option value="other">Filetype</option>
    <option value="video">🎬 Videos</option>
    <option value="books">📚 Books</option>
    <option value="music">🎵 Music</option>
    <option value="software">💿 Software</option>
  </select>

  <select id="engine">
    <option value="google">Google</option>
    <option value="startpage">Startpage</option>
    <option value="filepursuit">FilePursuit</option>
  </select>

  <input type="text" id="query" placeholder="e.g. Inception 2010">

  <button class="search-btn" onclick="search()">Search</button>
</div>

<script>
function search() {
  const q = document.getElementById('query').value.trim();
  if (!q) return alert("Kuch likho toh sahi!");

  const engine = document.getElementById('engine').value;
  const type = document.getElementById('filetype').value;
  let query = q;

  // Dork Logic (vahi purana)
  if (engine !== 'filepursuit' && type !== 'other') {
    if (type === 'video') query += " +(mkv|mp4|avi) -inurl:(php|html) intitle:index.of";
    // ... baki types yahan add kar sakte hain
  }

  const urls = {
    google: "https://www.google.com/search?q=",
    startpage: "https://www.startpage.com/do/dsearch?query=",
    filepursuit: "https://filepursuit.com/pursuit?q="
  };

  const finalUrl = urls[engine] + encodeURIComponent(query);

  // Responsive Behavior: Mobile par normal link, PC par Popup
  if (window.innerWidth < 768) {
    window.location.href = finalUrl;
  } else {
    window.open(finalUrl, "_blank", "width=900,height=700");
  }
}
</script>

</body>
</html>
