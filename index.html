<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Readnexa Finder - Responsive Edition</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8f9fa;
      color: #333;
      text-align: center;
      padding: 50px 20px 20px 20px; /* Mobile ke liye padding adjust ki hai */
      box-sizing: border-box;
    }

    .logo {
      font-size: 50px;
      font-weight: bold;
      color: #4285f4; 
      margin-bottom: 10px;
    }
    
    .logo span:nth-child(2) { color: #ea4335; } 
    .logo span:nth-child(3) { color: #fbbc05; } 
    .logo span:nth-child(4) { color: #4285f4; } 
    .logo span:nth-child(5) { color: #34a853; } 
    .logo span:nth-child(6) { color: #ea4335; } 

    p.subtitle {
      color: #555;
      margin-bottom: 40px;
      font-size: 14px;
    }

    /* PC Layout (Default) */
    .search-bar-wrapper {
      display: flex;
      justify-content: center;
      align-items: stretch;
      max-width: 850px;
      margin: 0 auto;
      border: 1px solid #dfe1e5;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 4px 10px rgba(32,33,36,.1);
      overflow: hidden;
    }

    .search-bar-wrapper select, 
    .search-bar-wrapper input, 
    .search-bar-wrapper button {
      border: none;
      padding: 15px;
      font-size: 16px;
      outline: none;
    }

    #filetype {
      background: #fff;
      color: #3c4043;
      border-right: 1px solid #dfe1e5;
      cursor: pointer;
    }

    #engine {
      background: #e9ecef;
      color: #3c4043;
      border-right: 1px solid #dfe1e5;
      cursor: pointer;
      font-weight: 500;
    }

    #query {
      flex-grow: 1;
      background: #fff;
      color: #202124;
      min-width: 200px;
    }

    .search-btn {
      background: #000;
      color: #fff;
      cursor: pointer;
      padding: 15px 30px;
      font-weight: bold;
      transition: background 0.3s;
    }

    .search-btn:hover {
      background: #333;
    }

    /* =========================================
       📱 MOBILE LAYOUT (Responsive CSS) 
       Ye sirf tab chalega jab screen chhoti hogi
       ========================================= */
    @media (max-width: 768px) {
      .logo {
        font-size: 40px; /* Mobile par logo thoda chhota */
      }
      
      .search-bar-wrapper {
        flex-direction: column; /* Line ki jagah ek ke niche ek */
        background: transparent;
        box-shadow: none;
        border: none;
      }

      .search-bar-wrapper select, 
      .search-bar-wrapper input, 
      .search-bar-wrapper button {
        width: 100%; /* Mobile par full width */
        margin-bottom: 12px;
        border-radius: 8px; /* Mobile par sabke rounded corners */
        border: 1px solid #dfe1e5 !important; /* Mobile par sabme border */
        box-sizing: border-box;
      }

      .search-btn {
        padding: 16px;
        font-size: 18px;
      }
    }
  </style>

</head>
<body>

<div class="logo">
  <span>R</span><span>e</span><span>a</span><span>d</span><span>n</span><span>e</span><span>x</span><span>a</span>
</div>
<p class="subtitle">Get direct download links for almost anything.</p>

<div class="search-bar-wrapper">
  <select id="filetype">
    <option value="other">Choose Filetype</option>
    <option value="video">🎬 TV/Movies/Video</option>
    <option value="books">📚 Books</option>
    <option value="music">🎵 Music</option>
    <option value="software">💿 Software/Games</option>
    <option value="images">🖼️ Images</option>
    <option value="other">⚙️ Other</option>
  </select>

  <select id="engine">
    <option value="google">🔍 Google</option>
    <option value="googol">🔍 Googol</option>
    <option value="startpage">🔍 Startpage</option>
    <option value="searx">🔍 Searx</option>
    <option value="filepursuit">📁 FilePursuit</option>
  </select>

  <input type="text" id="query" placeholder="Search e.g. The Matrix...">

  <button class="search-btn" onclick="search()">Search 🔍</button>
</div>

<script>
function search() {
  let q = document.getElementById("query").value.trim();
  let type = document.getElementById("filetype").value;
  let engine = document.getElementById("engine").value;

  if (!q) {
    alert("Please enter something to search!");
    document.getElementById("query").focus();
    return;
  }

  let query = "";

  if (engine !== "filepursuit") {
    if (type === "video") {
      query = `${q} +(mkv|mp4|avi|mov|mpg|wmv) -inurl:(jsp|pl|php|html|aspx|htm|cf|shtml) intitle:index.of -inurl:(listen77|mp3raid|mp3toss|mp3drug|index_of|wallywashis)`;
    } 
    else if (type === "books") {
      query = `${q} +(mobi|cbz|cbr|cbc|chm|epub|fb2|lit|lrf|odt|pdf|prc|pdb|pml|rb|snb|tcr|txt) -inurl:(jsp|pl|php|html|aspx|htm|cf|shtml) intitle:index.of -inurl:(listen77|mp3raid|mp3toss|mp3drug|index_of|wallywashis)`;
    } 
    else if (type === "music") {
      query = `${q} +(mp3|wav|ac3|ogg|flac|wma|m4a) -inurl:(jsp|pl|php|html|aspx|htm|cf|shtml) intitle:index.of -inurl:(listen77|mp3raid|mp3toss|mp3drug|index_of|wallywashis)`;
    } 
    else if (type === "software") {
      query = `${q} +(exe|iso|tar|rar|zip|apk|dmg) -inurl:(jsp|pl|php|html|aspx|htm|cf|shtml) intitle:index.of -inurl:(listen77|mp3raid|mp3toss|mp3drug|index_of|wallywashis)`;
    } 
    else if (type === "images") {
      query = `${q} +(jpg|png|bmp|gif|tif|tiff|psd) -inurl:(jsp|pl|php|html|aspx|htm|cf|shtml) intitle:index.of -inurl:(listen77|mp3raid|mp3toss|mp3drug|index_of|wallywashis)`;
    } 
    else {
      query = `${q} -inurl:(jsp|pl|php|html|aspx|htm|cf|shtml) intitle:index.of -inurl:(listen77|mp3raid|mp3toss|mp3drug|index_of|wallywashis)`;
    }
  } else {
    query = q;
  }

  let baseUrl = "";
  
  if (engine === "google" || engine === "googol") {
    baseUrl = "https://www.google.com/search?q=";
  } else if (engine === "startpage") {
    baseUrl = "https://www.startpage.com/do/dsearch?query=";
  } else if (engine === "searx") {
    baseUrl = "https://searx.be/search?q="; 
  } else if (engine === "filepursuit") {
    baseUrl = "https://filepursuit.com/pursuit?q=";
  }

  let finalUrl = baseUrl + encodeURIComponent(query);

  // 📱 SMART DEVICE DETECTION
  if (window.innerWidth <= 768) {
    // Agar Mobile hai, toh Popup ki jagah Secure Tab kholega (Best for phones)
    const link = document.createElement('a');
    link.href = finalUrl;
    link.target = '_blank';
    link.rel = 'noopener noreferrer'; 
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  } else {
    // Agar PC hai, toh Center Floating Popup kholega
    let width = window.innerWidth * 0.8; 
    let height = window.innerHeight * 0.8; 
    let left = (screen.width - width) / 2;
    let top = (screen.height - height) / 2;
    window.open(finalUrl, "ReadnexaSearchPopup", `width=${width},height=${height},top=${top},left=${left},scrollbars=yes,resizable=yes`);
  }
}

document.getElementById("query").addEventListener("keypress", function(event) {
  if (event.key === "Enter") {
    event.preventDefault(); 
    search();
  }
});
</script>

</body>
</html>
